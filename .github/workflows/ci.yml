name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Mapping contract test
        run: npm test -- --run tests/mapping.schema.test.ts --update=false

      - name: Test
        run: npm test -- --run --update=false

      - name: Type check
        run: npx tsc --noEmit
